<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0E1B2C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Field">
<link rel="apple-touch-icon" href="truck-icon.png">
<link rel="icon" href="truck-icon.png">
<title>Trip Tracker · Field</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root{--ink:#0E1B2C;--panel:#16263C;--panel2:#1D3049;--line:#26405F;--amber:#FFB020;
--text:#E8EDF4;--muted:#8DA2BC;--ok:#3DD68C;--bad:#FF6B6B;--warn:#FF9A3D;--r:14px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--ink);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
body{max-width:560px;margin:0 auto;padding:16px 16px 24px}
header{display:flex;align-items:center;gap:12px;padding:6px 2px 16px}
.logo{width:40px;height:40px;border-radius:10px;background:var(--amber);display:grid;place-items:center;flex:none;font-size:20px}
h1{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:24px;letter-spacing:.5px;line-height:1}
.sub{color:var(--muted);font-size:12px;margin-top:2px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:13px}
label{display:block;font-size:12px;color:var(--muted);margin:0 0 6px}
input,select,textarea{width:100%;background:var(--ink);border:1px solid var(--line);border-radius:10px;color:var(--text);padding:11px 12px;font-size:15px;font-family:inherit}
textarea{min-height:58px;resize:vertical}
input:focus,select:focus,textarea:focus{outline:2px solid var(--amber);outline-offset:1px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:11px;padding:13px 16px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;width:100%}
.btn.amber{background:var(--amber);color:#12100A}
.btn.ghost{background:var(--panel2);color:var(--text);border:1px solid var(--line)}
.btn.small{width:auto;padding:9px 13px;font-size:13px;border-radius:9px}
.btn.ok{background:rgba(61,214,140,.15);color:var(--ok);border:1px solid rgba(61,214,140,.4)}
.btn:disabled{opacity:.45;cursor:default}
.row{display:flex;gap:10px}.row>*{flex:1}
.gap{height:11px}
.st{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:17px;letter-spacing:.6px;margin-bottom:10px}
.note{font-size:12px;color:var(--muted);line-height:1.5}
.err{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.4);color:var(--bad);border-radius:10px;padding:11px 13px;font-size:13px;margin-bottom:12px;display:none}
.badge{border-radius:999px;padding:3px 10px;font-size:11px;font-weight:600}
.badge.active{background:rgba(255,176,32,.15);color:var(--amber)}
.badge.done{background:rgba(61,214,140,.15);color:var(--ok)}
.item{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px;margin-bottom:10px;cursor:pointer}
.item .t1{font-weight:600;font-size:15px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.item .t2{color:var(--muted);font-size:12px;margin-top:3px}
.item.d-delivered .t1 span:first-child{color:var(--ok)}
.item.d-undelivered{border:1px solid var(--bad)}
.item.d-undelivered .t1 span:first-child{color:var(--bad)}
.item.d-partial .t1 span:first-child{color:var(--warn)}
.back{background:none;border:none;color:var(--amber);font-size:14px;font-weight:600;cursor:pointer;padding:0 0 12px;font-family:inherit}
.slot{border:1px dashed var(--line);border-radius:12px;padding:12px;margin-bottom:10px}
.slot .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.slot .name{font-size:13px;font-weight:600}
.slot .time{font-size:12px;color:var(--muted)}
.thumbs{display:flex;gap:8px;flex-wrap:wrap}
.thumb{width:56px;height:56px;object-fit:cover;border-radius:8px;border:1px solid var(--line);cursor:pointer}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:32px 10px;line-height:1.7}
.modal{position:fixed;inset:0;background:rgba(4,10,18,.92);display:none;place-items:center;z-index:50;padding:16px}
.modal.on{display:grid}
.modal img{max-width:100%;max-height:82vh;border-radius:12px}
.modal .close{position:absolute;top:18px;right:18px;background:var(--panel);border:1px solid var(--line);color:var(--text);border-radius:999px;width:38px;height:38px;font-size:17px;cursor:pointer}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:999px;padding:9px 18px;font-size:13px;opacity:0;pointer-events:none;transition:all .25s;z-index:60}
.toast.show{opacity:1}
.pill{display:inline-block;background:var(--ink);border:1px solid var(--line);border-radius:999px;padding:5px 12px;font-size:12px;color:var(--muted);margin-bottom:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.grid2 .full{grid-column:1/-1}
.kv{background:var(--ink);border:1px solid var(--line);border-radius:10px;padding:8px 11px}
.kv .k{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
.spin{width:15px;height:15px;border:2px solid rgba(0,0,0,.25);border-top-color:#12100A;border-radius:50%;animation:rot .7s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
#userBar{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);margin-bottom:12px}
#userBar button{background:none;border:none;color:var(--amber);font-weight:600;cursor:pointer;font-family:inherit;font-size:12px}
.pwwrap{position:relative}
.pwwrap input{padding-right:46px}
.pweye{position:absolute;right:4px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);font-size:17px;cursor:pointer;padding:8px}
</style>
</head>
<body>
<header>
  <div class="logo">🚚</div>
  <div><h1>TRIP TRACKER</h1><div class="sub">Field</div></div>
</header>

<!-- SIGN IN -->
<div id="vSignin">
  <div class="card">
    <div class="st">SIGN IN</div>
    <div class="err" id="authErr"></div>
    <label>Email</label><input id="inEmail" type="email" autocomplete="username">
    <div class="gap"></div>
    <label>Password</label>
    <div class="pwwrap"><input id="inPass" type="password" autocomplete="current-password"><button type="button" class="pweye" id="eye1">👁</button></div>
    <div class="gap"></div>
    <button class="btn amber" id="btnSignin">Sign in</button>
    <div class="gap"></div>
    <div class="note">No account? Ask your admin to enroll you.</div>
  </div>
</div>

<!-- TRIPS -->
<div id="vTrips" style="display:none">
  <div id="userBar"><span id="whoami"></span><button id="btnOut">Sign out</button></div>
  <button class="btn amber" id="btnNewTrip" style="margin-bottom:13px">+ New trip ticket</button>
  <div id="tripsList"><div class="empty">Loading…</div></div>
</div>

<!-- NEW TRIP -->
<div id="vNewTrip" style="display:none">
  <button class="back" data-back="trips">‹ Trips</button>
  <div class="card">
    <div class="st">NEW TRIP TICKET</div>
    <div class="grid2">
      <div><label>Trip Ticket #</label><input id="ntTicket"></div>
      <div><label>Date</label><input id="ntDate" type="date"></div>
      <div><label>Driver</label><input id="ntDriver"></div>
      <div><label>Loader / Helper</label><input id="ntLoader"></div>
      <div class="full"><label>Plate # (vehicle)</label><input id="ntPlate" placeholder="Assigned by admin — leave blank if unsure"></div>
    </div>
    <div class="gap"></div>
    <button class="btn amber" id="btnSaveTrip">Save trip</button>
  </div>
</div>

<!-- TRIP DETAIL (drops) -->
<div id="vTrip" style="display:none">
  <button class="back" data-back="trips">‹ Trips</button>
  <div class="card" id="tripHead"></div>
  <button class="btn amber" id="btnNewDrop" style="margin-bottom:13px">📷 New drop — scan Delivery Receipt</button>
  <div id="dropsList"></div>
</div>

<!-- DROP DETAIL -->
<div id="vDrop" style="display:none">
  <button class="back" data-back="trip">‹ Drops</button>
  <div class="err" id="dropErr"></div>

  <div class="card">
    <div class="st">DOCUMENTS</div>
    <div class="slot" id="slotSI">
      <div class="head"><span class="name">Sales Invoice</span><button class="btn ghost small" data-scan="si">📷 Scan</button></div>
      <div class="thumbs" id="ph-si"></div>
    </div>
    <div class="slot" id="slotDR">
      <div class="head"><span class="name">Delivery Receipt</span><button class="btn ghost small" data-scan="dr">📷 Scan</button></div>
      <div class="thumbs" id="ph-dr"></div>
    </div>
    <div class="slot" id="slotPay" style="display:none">
      <div class="head"><span class="name">Payment proof</span><button class="btn ghost small" data-scan="payment">📷 Photo</button></div>
      <div class="thumbs" id="ph-payment"></div>
    </div>
  </div>

  <div class="card">
    <div class="st">TIMELINE</div>
    <div class="slot">
      <div class="head"><span class="name">Arrival</span><span class="time" id="tArr">—</span></div>
      <div class="thumbs" id="ph-arrival"></div>
      <div class="gap"></div>
      <button class="btn ghost small" data-cap="arrival">📍 Capture arrival</button>
    </div>
    <div class="slot">
      <div class="head"><span class="name">Time Received</span><span class="time" id="tRec">—</span></div>
      <div class="thumbs" id="ph-received"></div>
      <div class="gap"></div>
      <button class="btn ghost small" data-cap="received">📷 Capture received</button>
    </div>
    <div class="slot">
      <div class="head"><span class="name">Departure</span><span class="time" id="tDep">—</span></div>
      <div class="thumbs" id="ph-departure"></div>
      <div class="gap"></div>
      <button class="btn ghost small" data-cap="departure">🏁 Capture departure</button>
      <div class="note" id="depHint" style="margin-top:7px"></div>
    </div>
  </div>

  <div class="card">
    <div class="st">DETAILS</div>
    <div class="grid2">
      <div class="kv"><div class="k">Trip Ticket #</div><div id="fTicket">—</div></div>
      <div class="kv"><div class="k">Date</div><div id="fDate">—</div></div>
      <div><label>S.I #</label><input id="fSi"></div>
      <div><label>Doc #</label><input id="fDoc"></div>
      <div><label>Amount</label><input id="fAmt" inputmode="decimal"></div>
      <div><label>C.R #</label><input id="fCr"></div>
      <div class="full"><label>Payment Ref</label><input id="fPayref"></div>
      <div class="full"><label>Customer</label><input id="fCust"></div>
      <div><label>MOP</label>
        <select id="fMop"><option></option><option>COD</option><option>Online Payment</option><option>Credit Card</option><option>PDC 30 Days</option><option>PDC 60 Days</option><option>30 Days</option><option>60 Days</option><option>N/A</option></select>
      </div>
      <div><label>Plate #</label><input id="fPlate"></div>
      <div class="full"><label>Location</label><input id="fLoc"></div>
      <div><label>Del. Status</label>
        <select id="fDel"><option></option><option>Delivered</option><option>Undelivered</option><option>Partial</option></select>
      </div>
      <div><label>Coll Status</label>
        <select id="fColl"><option>N/A</option><option>Collected</option></select>
      </div>
      <div class="full"><label>Remarks <span id="remReq" style="color:var(--bad);display:none">(required for Undelivered)</span></label><textarea id="fRem"></textarea></div>
    </div>
    <div class="gap"></div>
    <button class="btn ghost" id="btnSaveDraft">Save</button>
    <div class="gap"></div>
    <button class="btn amber" id="btnSubmit">Submit drop</button>
  </div>
</div>

<div class="modal" id="photoModal"><button class="close" id="modalClose">✕</button><img id="modalImg" alt=""></div>
<div class="toast" id="toast"></div>
<input type="file" accept="image/*" capture="environment" id="camFile" hidden>

<script>
/* ============ CONFIG — paste your Firebase config here once ============ */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyA6NcOmvYrXm9D3aNOBoZ0k9-uQdiX62hY",
  authDomain: "trip-tracking-7bfed.firebaseapp.com",
  projectId: "trip-tracking-7bfed",
  storageBucket: "trip-tracking-7bfed.firebasestorage.app",
  messagingSenderId: "792354160988",
  appId: "1:792354160988:web:c6ffcea3fd06eea9c58199"
};
/* ======================================================================= */

/* ============ TEST MODE — set to false when going live ============ */
const TEST_MODE = true;
/* =================================================================== */

const LS='ttf_settings';
let settings=JSON.parse(localStorage.getItem(LS)||'{}');
let db=null,me=null,meDoc=null,geminiKey='';
let curTrip=null,curDrop=null,unsubTrips=null,unsubDrops=null,unsubPhotos=null;
let camPurpose=null; // {mode:'scan'|'cap', kind}
let dropPhotos=[];

const $=id=>document.getElementById(id);
const toast=m=>{const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);};
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const phNow=()=>new Date().toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Manila'});
const phToday=()=>new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Manila'}).format(new Date());
let SV=()=>Date.now();

/* ---- in-memory mock DB for TEST MODE (no Firebase needed) ---- */
function makeMockDb(){
  const store={},listeners=[];
  const genId=()=>Math.random().toString(36).slice(2,10)+Date.now().toString(36);
  const snap=(docs)=>({empty:docs.length===0,forEach:fn=>docs.forEach(d=>fn({id:d.__id,data:()=>({...d})}))});
  function run(q){
    let docs=Object.entries(store[q.coll]||{}).map(([id,d])=>({...d,__id:id}));
    (q.wheres||[]).forEach(w=>docs=docs.filter(d=>d[w.f]===w.v));
    if(q.ord)docs.sort((a,b)=>{const x=a[q.ord.f]??0,y=b[q.ord.f]??0;return q.ord.dir==='desc'?(y>x?1:x>y?-1:0):(x>y?1:y>x?-1:0);});
    if(q.lim)docs=docs.slice(0,q.lim);
    return docs;
  }
  const notify=()=>listeners.forEach(l=>{try{l.fire()}catch(e){}});
  function query(coll,base){
    const q=base||{coll,wheres:[]};
    return{
      where:(f,op,v)=>query(coll,{...q,wheres:[...q.wheres,{f,v}]}),
      orderBy:(f,dir)=>query(coll,{...q,ord:{f,dir:dir||'asc'}}),
      limit:n=>query(coll,{...q,lim:n}),
      startAfter:()=>query(coll,q),
      get:async()=>snap(run(q)),
      onSnapshot:(cb)=>{const l={fire:()=>cb(snap(run(q)))};listeners.push(l);l.fire();return()=>{const i=listeners.indexOf(l);if(i>-1)listeners.splice(i,1);};},
      add:async(obj)=>{const id=genId();(store[coll]=store[coll]||{})[id]={...obj};notify();return{id};},
      doc:(id)=>({
        get:async()=>({exists:!!(store[coll]&&store[coll][id]),data:()=>({...(store[coll]||{})[id]})}),
        set:async(obj,opts)=>{store[coll]=store[coll]||{};store[coll][id]=(opts&&opts.merge)?{...(store[coll][id]||{}),...obj}:{...obj};notify();},
        update:async(obj)=>{if(store[coll]&&store[coll][id]){Object.assign(store[coll][id],obj);notify();}},
        onSnapshot:(cb)=>{const l={fire:()=>{const d=(store[coll]||{})[id];cb({exists:!!d,id,data:()=>({...d})});}};listeners.push(l);l.fire();return()=>{};}
      })
    };
  }
  return{collection:c=>query(c),enablePersistence:()=>Promise.resolve()};
}

/* ============ views ============ */
function show(v){['vSignin','vTrips','vNewTrip','vTrip','vDrop'].forEach(x=>$(x).style.display=x===v?'block':'none');}
document.querySelectorAll('.back').forEach(b=>b.onclick=()=>{
  if(b.dataset.back==='trips'){if(unsubDrops)unsubDrops();show('vTrips');}
  else if(b.dataset.back==='trip'){if(unsubPhotos)unsubPhotos();curDrop=null;show('vTrip');}
});

/* ============ boot / auth ============ */
function boot(){
  if(TEST_MODE){
    db=makeMockDb();
    me={uid:'test'};meDoc={name:'Tester',role:'field'};
    geminiKey=settings.gk||'';
    if(!geminiKey){
      const k=prompt('TEST MODE — paste your Gemini API key so scanning works (or Cancel to test without scanning)');
      if(k){geminiKey=k.trim();settings.gk=geminiKey;localStorage.setItem(LS,JSON.stringify(settings));}
    }
    $('whoami').textContent='⚠ TEST MODE — no sign-in, data clears on refresh';
    startTrips();show('vTrips');return;
  }
  const cfg=FIREBASE_CONFIG||settings.fb;
  if(!cfg){
    const raw=prompt('First-time setup: paste your Firebase config {...} block');
    if(!raw)return;
    try{
      const fixed=raw.replace(/^\s*const\s+firebaseConfig\s*=\s*/,'').replace(/;\s*$/,'')
        .replace(/([{,]\s*)([A-Za-z0-9_]+)\s*:/g,'$1"$2":').replace(/'/g,'"');
      settings.fb=JSON.parse(fixed);localStorage.setItem(LS,JSON.stringify(settings));
    }catch(e){alert('That config didn\'t parse. Reload and try again.');return;}
  }
  firebase.initializeApp(FIREBASE_CONFIG||settings.fb);
  db=firebase.firestore();
  SV=()=>firebase.firestore.FieldValue.serverTimestamp();
  db.enablePersistence({synchronizeTabs:true}).catch(()=>{});
  firebase.auth().onAuthStateChanged(async u=>{
    me=u;
    if(!u){show('vSignin');return;}
    const ud=await db.collection('tt_users').doc(u.uid).get();
    meDoc=ud.exists?ud.data():{name:u.email,role:'field'};
    if(meDoc.active===false){await firebase.auth().signOut();alert('Your account is disabled. Contact admin.');return;}
    $('whoami').textContent=(meDoc.name||u.email)+' · '+(meDoc.role||'field');
    try{const s=await db.collection('tt_settings').doc('config').get();geminiKey=s.exists?(s.data().geminiKey||''):'';}catch(e){}
    startTrips();show('vTrips');
  });
}
$('eye1').onclick=()=>{const i=$('inPass');i.type=i.type==='password'?'text':'password';$('eye1').textContent=i.type==='password'?'👁':'🙈';};
$('btnSignin').onclick=async()=>{
  $('authErr').style.display='none';
  try{await firebase.auth().signInWithEmailAndPassword($('inEmail').value.trim(),$('inPass').value);}
  catch(e){$('authErr').textContent=e.message;$('authErr').style.display='block';}
};
$('btnOut').onclick=()=>{if(TEST_MODE){toast('Test mode — no sign-in to sign out of');return;}firebase.auth().signOut();};

/* ============ immutable action log ============ */
function log(action,target,detail){
  db.collection('tt_logs').add({ts:SV(),uid:me.uid,by:meDoc.name||me.email,email:me.email,app:'field',action,target:target||'',detail:detail||''}).catch(()=>{});
}

/* ============ trips ============ */
function startTrips(){
  if(unsubTrips)unsubTrips();
  unsubTrips=db.collection('tt_trips').orderBy('createdAt','desc').limit(30).onSnapshot(snap=>{
    const list=$('tripsList');list.innerHTML='';
    if(snap.empty){list.innerHTML='<div class="empty">No trips yet.<br>Tap “New trip ticket”.</div>';return;}
    snap.forEach(d=>{
      const t=d.data();
      const div=document.createElement('div');div.className='item';
      div.innerHTML=`<div class="t1"><span>#${esc(t.ticket)}</span><span class="badge ${t.status==='active'?'active':'done'}">${t.status==='active'?'ACTIVE':'DONE'}</span></div>
        <div class="t2">${esc(t.date||'')} · ${esc(t.driver||'')}${t.loader?' & '+esc(t.loader):''} · ${esc(t.plate||'')}</div>`;
      div.onclick=()=>openTrip(d.id,t);
      list.appendChild(div);
    });
  });
}
$('btnNewTrip').onclick=()=>{
  $('ntDate').value=phToday();
  $('ntDriver').value=meDoc.name||'';
  show('vNewTrip');
};
$('btnSaveTrip').onclick=async()=>{
  const ticket=$('ntTicket').value.trim();
  if(!ticket){toast('Trip Ticket # is required');return;}
  const doc={ticket,date:$('ntDate').value,driver:$('ntDriver').value.trim(),loader:$('ntLoader').value.trim(),plate:$('ntPlate').value.trim(),status:'active',createdBy:me.uid,createdAt:SV()};
  const ref=await db.collection('tt_trips').add(doc);
  log('trip.create',ticket,'Driver '+doc.driver+(doc.loader?' & '+doc.loader:''));
  toast('Trip saved');openTrip(ref.id,doc);
};

function openTrip(id,t){
  curTrip={id,...t};
  $('tripHead').innerHTML=`<div class="st" style="margin:0">TICKET #${esc(t.ticket)}</div>
    <div class="note">${esc(t.date||'')} · ${esc(t.driver||'')}${t.loader?' & '+esc(t.loader):''} · ${esc(t.plate||'')}</div>`;
  if(unsubDrops)unsubDrops();
  unsubDrops=db.collection('tt_drops').where('tripId','==',id).onSnapshot(snap=>{
    const drops=[];snap.forEach(d=>drops.push({id:d.id,...d.data()}));
    drops.sort((a,b)=>(a.arrivalMs||a.createdMs||0)-(b.arrivalMs||b.createdMs||0));
    const list=$('dropsList');list.innerHTML='';
    if(!drops.length){list.innerHTML='<div class="empty">No drops yet.<br>Scan the first Delivery Receipt.</div>';return;}
    drops.forEach((s,i)=>{
      const cls=s.delStatus==='Delivered'?'d-delivered':s.delStatus==='Undelivered'?'d-undelivered':s.delStatus==='Partial'?'d-partial':'';
      const div=document.createElement('div');div.className='item '+cls;
      div.innerHTML=`<div class="t1"><span>Doc #: ${esc(s.doc||'—')}</span><span class="note">Drop ${i+1}</span></div>
        <div class="t2">${esc(s.customer||'')}${s.delStatus?' · '+esc(s.delStatus):''}</div>`;
      div.onclick=()=>openDrop(s.id);
      list.appendChild(div);
    });
  });
  show('vTrip');
}

/* ============ drop create (scan D.R) ============ */
$('btnNewDrop').onclick=()=>{camPurpose={mode:'newdrop'};$('camFile').click();};

async function createDropFromDR(imgData){
  toast('Reading Delivery Receipt…');
  let ex={};
  try{ex=await gemini(imgData,'This is a Delivery Receipt (D.R). Extract ONLY these fields with EXACT labels: "Doc #" = the Doc Num / document number, "Contact #" = the phone number inside the Special Instruction box (format +639XXXXXXXXX), "Customer" = the Sold to name (use the most readable version).');}
  catch(e){toast('Scan failed ('+e.message+') — drop created blank');}
  const f=ex.fields||{};
  const ref=await db.collection('tt_drops').add({
    tripId:curTrip.id,ticket:curTrip.ticket,date:phToday(),
    doc:f['Doc #']||'',contact:f['Contact #']||'',customer:f['Customer']||'',
    si:'',amount:'',cr:'',payref:'',mop:'',location:'',plate:curTrip.plate||'',
    delStatus:'',collStatus:'N/A',remarks:'',
    arrival:'',received:'',departure:'',arrivalMs:0,createdMs:Date.now(),
    status:'in-progress',createdBy:me.uid,createdAt:SV(),updatedAt:SV()
  });
  await addPhoto(ref.id,'dr',imgData);
  log('drop.create',curTrip.ticket+'/'+(f['Doc #']||ref.id),'From D.R scan · '+(f['Customer']||''));
  openDrop(ref.id);
}

/* ============ drop detail ============ */
let dropData=null;
function openDrop(id){
  curDrop=id;
  if(unsubPhotos)unsubPhotos();
  db.collection('tt_drops').doc(id).onSnapshot(d=>{
    if(!d.exists)return;
    dropData={id:d.id,...d.data()};renderDrop();
  });
  unsubPhotos=db.collection('tt_photos').where('dropId','==',id).onSnapshot(snap=>{
    dropPhotos=[];snap.forEach(p=>dropPhotos.push({id:p.id,...p.data()}));
    dropPhotos.sort((a,b)=>(a.ms||0)-(b.ms||0));renderPhotos();
  });
  show('vDrop');
}
function renderDrop(){
  const s=dropData;
  $('fTicket').textContent=s.ticket||'—';$('fDate').textContent=s.date||'—';
  const set=(id,v)=>{const el=$(id);if(document.activeElement!==el)el.value=v??'';};
  set('fSi',s.si);set('fDoc',s.doc);set('fAmt',s.amount);set('fCr',s.cr);set('fPayref',s.payref);
  set('fCust',s.customer);set('fMop',s.mop);set('fPlate',s.plate);set('fLoc',s.location);
  set('fDel',s.delStatus);set('fColl',s.collStatus||'N/A');set('fRem',s.remarks);
  $('tArr').textContent=s.arrival||'—';$('tRec').textContent=s.received||'—';$('tDep').textContent=s.departure||'—';
  $('slotPay').style.display=(s.mop==='Online Payment'||$('fMop').value==='Online Payment')?'block':'none';
  $('remReq').style.display=($('fDel').value==='Undelivered')?'inline':'none';
  $('depHint').textContent = ($('fDel').value==='Undelivered')?'Up to 2 photos: location or signed D.R with remarks':'If delivered: signed S.I, cheque, C.R, D.R — up to 4 photos in this slot';
}
$('fMop').onchange=()=>{$('slotPay').style.display=$('fMop').value==='Online Payment'?'block':'none';autoColl();};
$('fDel').onchange=()=>{$('remReq').style.display=$('fDel').value==='Undelivered'?'inline':'none';autoColl();renderDropHintOnly();};
function renderDropHintOnly(){$('depHint').textContent=($('fDel').value==='Undelivered')?'Up to 2 photos: location or signed D.R with remarks':'If delivered: signed S.I, cheque, C.R, D.R — up to 4 photos in this slot';}
function autoColl(){
  const del=$('fDel').value,mop=$('fMop').value;
  $('fColl').value=(del==='Delivered'&&['COD','PDC 30 Days','PDC 60 Days'].includes(mop))?'Collected':'N/A';
}

function renderPhotos(){
  ['si','dr','payment','arrival','received','departure'].forEach(kind=>{
    const box=$('ph-'+kind);if(!box)return;box.innerHTML='';
    dropPhotos.filter(p=>p.kind===kind).forEach(p=>{
      const im=document.createElement('img');im.className='thumb';im.src=p.data;
      im.onclick=()=>{$('modalImg').src=p.data;$('photoModal').classList.add('on');};
      box.appendChild(im);
    });
  });
}
$('modalClose').onclick=()=>$('photoModal').classList.remove('on');
$('photoModal').onclick=e=>{if(e.target.id==='photoModal')$('photoModal').classList.remove('on');};

/* ============ camera routing ============ */
document.querySelectorAll('[data-scan]').forEach(b=>b.onclick=()=>{camPurpose={mode:'scan',kind:b.dataset.scan};$('camFile').click();});
document.querySelectorAll('[data-cap]').forEach(b=>b.onclick=()=>{camPurpose={mode:'cap',kind:b.dataset.cap};$('camFile').click();});

$('camFile').onchange=e=>{
  const f=e.target.files[0];e.target.value='';if(!f)return;
  const reader=new FileReader();
  reader.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=1100;let w=img.width,h=img.height;
      if(Math.max(w,h)>MAX){const s=MAX/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      let q=0.6,out=cv.toDataURL('image/jpeg',q);
      while(out.length>650000&&q>0.3){q-=0.1;out=cv.toDataURL('image/jpeg',q);}
      routePhoto(out);
    };
    img.src=reader.result;
  };
  reader.readAsDataURL(f);
};

async function routePhoto(data){
  const p=camPurpose;camPurpose=null;if(!p)return;
  if(p.mode==='newdrop'){createDropFromDR(data);return;}
  if(!curDrop)return;
  const caps={departure:($('fDel').value==='Undelivered')?2:4,payment:2,arrival:2,received:2,si:2,dr:2};
  const have=dropPhotos.filter(x=>x.kind===p.kind).length;
  if(have>=(caps[p.kind]||2)){toast('Photo limit reached for this slot');return;}
  await addPhoto(curDrop,p.kind,data);
  const up={updatedAt:SV()};
  if(p.mode==='cap'){
    const t=phNow();
    if(p.kind==='arrival'&&!dropData.arrival){up.arrival=t;up.arrivalMs=Date.now();up.location2=await getGPS();}
    if(p.kind==='received'&&!dropData.received){up.received=t;}
    if(p.kind==='departure'&&!dropData.departure){up.departure=t;}
    log('drop.capture',dropData.ticket+'/'+(dropData.doc||curDrop),p.kind+' @ '+t);
  }else log('drop.scan',dropData.ticket+'/'+(dropData.doc||curDrop),p.kind);
  await db.collection('tt_drops').doc(curDrop).update(up);

  /* Dr. Can extraction per slot */
  try{
    if(p.kind==='si'){
      const ex=await gemini(data,'This is a Sales Invoice (S.I). Extract ONLY these 5 fields with EXACT labels: "S.I #" = the Invoice No., "Amount" = the Total Amount, "Customer" = the Sold to name, "MOP" = the Term (map to one of: COD, Online Payment, Credit Card, PDC 30 Days, PDC 60 Days, 30 Days, 60 Days, N/A — e.g. Cash means COD), "Address" = ONLY the city or province.');
      const f=ex.fields||{};const u={updatedAt:SV()};
      if(f['S.I #'])u.si=f['S.I #'];if(f['Amount'])u.amount=f['Amount'];
      if(f['Customer']&&!dropData.customer)u.customer=f['Customer'];
      if(f['MOP'])u.mop=f['MOP'];if(f['Address'])u.location=f['Address'];
      await db.collection('tt_drops').doc(curDrop).update(u);
      log('drop.autofill',dropData.ticket+'/'+(dropData.doc||curDrop),'From S.I: '+Object.keys(f).join(', '));
      toast('S.I read ✓');
    }
    if(p.kind==='dr'){
      const ex=await gemini(data,'This is a Delivery Receipt (D.R). Extract ONLY: "Doc #" = the Doc Num, "Contact #" = phone in the Special Instruction box (+639 format), "Customer" = the Sold to name.');
      const f=ex.fields||{};const u={updatedAt:SV()};
      if(f['Doc #']&&!dropData.doc)u.doc=f['Doc #'];
      if(f['Contact #'])u.contact=f['Contact #'];
      if(f['Customer']&&!dropData.customer)u.customer=f['Customer'];
      await db.collection('tt_drops').doc(curDrop).update(u);toast('D.R read ✓');
    }
    if(p.kind==='departure'&&$('fDel').value!=='Undelivered'){
      const ex=await gemini(data,'This photo may show a signed Sales Invoice, a cheque, a Collection Receipt (C.R), or a Delivery Receipt. Extract ONLY if clearly visible: "C.R #" = the Collection Receipt number, "Payment Ref" = any cheque number or payment reference number. If a field is not visible, omit it entirely.');
      const f=ex.fields||{};const u={updatedAt:SV()};
      if(f['C.R #'])u.cr=f['C.R #'];if(f['Payment Ref'])u.payref=f['Payment Ref'];
      if(u.cr||u.payref){await db.collection('tt_drops').doc(curDrop).update(u);toast('C.R / ref read ✓');}
    }
    if(p.kind==='payment'){
      const ex=await gemini(data,'This is an online payment proof (e.g. GCash, bank transfer screenshot, or receipt). Extract ONLY: "Payment Ref" = the reference number, "Amount" = the amount paid if visible.');
      const f=ex.fields||{};const u={updatedAt:SV()};
      if(f['Payment Ref'])u.payref=f['Payment Ref'];
      if(u.payref){await db.collection('tt_drops').doc(curDrop).update(u);toast('Payment ref read ✓');}
    }
  }catch(e){toast('Auto-read skipped: '+e.message);}
}

async function addPhoto(dropId,kind,data){
  await db.collection('tt_photos').add({dropId,kind,data,ms:Date.now(),ts:SV(),by:meDoc.name||me.email});
}

/* ============ save / submit ============ */
function collectForm(){
  return {si:$('fSi').value.trim(),doc:$('fDoc').value.trim(),amount:$('fAmt').value.trim(),
    cr:$('fCr').value.trim(),payref:$('fPayref').value.trim(),customer:$('fCust').value.trim(),
    mop:$('fMop').value,plate:$('fPlate').value.trim(),location:$('fLoc').value.trim(),
    delStatus:$('fDel').value,collStatus:$('fColl').value,remarks:$('fRem').value.trim(),updatedAt:SV()};
}
$('btnSaveDraft').onclick=async()=>{
  await db.collection('tt_drops').doc(curDrop).update(collectForm());
  log('drop.edit',dropData.ticket+'/'+($('fDoc').value||curDrop),'Saved by field');
  toast('Saved');
};
$('btnSubmit').onclick=async()=>{
  const f=collectForm();
  // suggest del status from timestamps if crew hasn't chosen
  if(!f.delStatus)f.delStatus=(dropData.departure&&dropData.received)?'Delivered':(dropData.departure?'Undelivered':'');
  if(!f.delStatus){toast('Choose the Del. Status first');return;}
  if(f.delStatus==='Undelivered'&&!f.remarks){$('remReq').style.display='inline';toast('Remarks are required for Undelivered');return;}
  const hasDR=dropPhotos.some(p=>p.kind==='dr');
  if(!hasDR){toast('Delivery Receipt scan is required');return;}
  if(f.delStatus==='Delivered'&&['COD','PDC 30 Days','PDC 60 Days'].includes(f.mop))f.collStatus='Collected';
  if(f.mop==='Online Payment')f.collStatus='N/A';
  f.status='submitted';
  await db.collection('tt_drops').doc(curDrop).update(f);
  log('drop.submit',dropData.ticket+'/'+(f.doc||curDrop),f.delStatus+' · '+(f.customer||''));
  toast('Drop submitted ✓');
  show('vTrip');
};

/* ============ GPS ============ */
function getGPS(){return new Promise(res=>{
  if(!navigator.geolocation)return res('');
  navigator.geolocation.getCurrentPosition(p=>res(p.coords.latitude.toFixed(6)+','+p.coords.longitude.toFixed(6)),()=>res(''),{timeout:8000,maximumAge:60000});
});}

/* ============ Gemini (Dr. Can engine) ============ */
async function gemini(dataUrl,prompt){
  if(!geminiKey)throw new Error('No Gemini key set by admin');
  const b64=dataUrl.split(',')[1];
  const res=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key='+encodeURIComponent(geminiKey),{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:[{parts:[{inline_data:{mime_type:'image/jpeg',data:b64}},
      {text:prompt+'\n\nRespond with ONLY valid JSON, no markdown: {"fields":{"Label":"value"},"confidence":"high|medium|low"}. Never guess unreadable text — omit the field instead.'}]}],
      generationConfig:{maxOutputTokens:1200,temperature:0.1}})
  });
  const d=await res.json();
  if(d.error)throw new Error(d.error.code===429?'free limit — wait a minute':(d.error.message||'API error'));
  const txt=(d.candidates?.[0]?.content?.parts||[]).map(p=>p.text||'').join('');
  const out=JSON.parse(txt.replace(/```json|```/g,'').trim());
  // normalize phones
  if(out.fields)for(const k of Object.keys(out.fields)){
    if(/contact|phone/i.test(k)){const dg=String(out.fields[k]).replace(/\D/g,'');
      if(dg.length===11&&dg.startsWith('09'))out.fields[k]='+63'+dg.slice(1);
      else if(dg.length===10&&dg.startsWith('9'))out.fields[k]='+63'+dg;
      else if(dg.length===12&&dg.startsWith('639'))out.fields[k]='+'+dg;}}
  return out;
}
